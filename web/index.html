<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Buddy</title>
  <style>
    :root {
      --bg: #111318;
      --panel: #181c24;
      --panel-soft: #202633;
      --line: #313a4a;
      --text: #e8ecf4;
      --muted: #a4afc3;
      --primary: #de7d5a;
      --primary-hover: #eb8965;
      --success: #61d38f;
      --danger: #e98585;
      --shadow: 0 10px 32px rgba(0, 0, 0, .24);
    }

    body[data-theme="light"] {
      --bg: #eef1f7;
      --panel: #ffffff;
      --panel-soft: #f5f7fb;
      --line: #d8dfec;
      --text: #1e2430;
      --muted: #647086;
      --primary: #d46843;
      --primary-hover: #c95b35;
      --success: #2ea66a;
      --danger: #d35656;
      --shadow: 0 10px 28px rgba(39, 50, 77, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(circle at top left, #1b2230, var(--bg) 45%);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      gap: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
    }

    .title {
      font-weight: 700;
      font-size: 18px;
      letter-spacing: .3px;
    }

    .status {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .35px;
    }

    textarea, pre, .meta-panel {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel-soft);
      color: var(--text);
      margin: 0;
      padding: 10px;
      font-size: 13px;
      line-height: 1.5;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
      outline: none;
      font-family: ui-monospace, Consolas, monospace;
    }

    pre {
      min-height: 170px;
      max-height: 300px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, Consolas, monospace;
    }

    .actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s ease;
    }

    button:hover { transform: translateY(-1px); }

    button.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #2b130c;
    }

    button.primary:hover { background: var(--primary-hover); }
    button.ghost { color: var(--muted); }

    .hint { margin-left: auto; color: var(--muted); font-size: 12px; }
    .danger { color: var(--danger); }

    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid var(--line);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    .spinner.show { display: inline-block; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-badge {
      display: none;
      background: var(--danger);
      color: #fff;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
    }
    .error-badge.show { display: inline-block; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #statusMsg.error { color: var(--danger); font-weight: 600; }

    .result-grid {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 10px;
    }

    .meta-panel {
      min-height: 120px;
      font-size: 12px;
      color: var(--muted);
    }

    .meta-list {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 10px;
    }

    .meta-list .k { color: var(--muted); }
    .meta-list .v { color: var(--text); }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .35);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 10;
    }

    .overlay.show { display: flex; }

    .modal {
      width: min(780px, 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .tab-btn {
      border: 0;
      border-right: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      padding: 10px 14px;
      color: var(--muted);
    }

    .tab-btn.active {
      color: var(--text);
      background: var(--panel);
    }

    .tab {
      display: none;
      padding: 12px;
      gap: 10px;
    }

    .tab.active { display: grid; }

    label {
      font-size: 12px;
      color: var(--muted);
      display: grid;
      gap: 6px;
    }

    input, select {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel-soft);
      color: var(--text);
      padding: 8px 10px;
      outline: none;
    }

    .model-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .modal-actions {
      border-top: 1px solid var(--line);
      padding: 10px 12px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .history-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 6px;
      font-size: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px;
      cursor: pointer;
      transition: background .15s;
    }
    .history-item:hover { background: var(--panel-soft); }
    .history-item .hi-time { color: var(--muted); }
    .history-item .hi-meta { color: var(--muted); font-size: 11px; }
    .hi-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
    }
    .hi-badge.mock { background: var(--line); color: var(--muted); }
    .hi-badge.api { background: var(--primary); color: #2b130c; }
    .hi-badge.ok { background: var(--success); color: #0c2b13; }
    .hi-badge.warn { background: var(--danger); color: #fff; }

    @media (max-width: 980px) {
      .workspace, .result-grid {
        grid-template-columns: 1fr;
      }
      .hint { margin-left: 0; }
    }
  </style>
</head>
<body data-theme="dark">
  <div class="app">
    <header class="topbar">
      <div class="title">Prompt Buddy 控制台</div>
      <button class="ghost" onclick="openSettings()">设置</button>
      <div class="status"><span class="dot"></span><span id="healthLabel">检查服务中...</span><span class="spinner" id="genSpinner"></span><span class="error-badge" id="errorBadge"></span></div>
    </header>

    <section class="workspace">
      <div class="card">
        <h3>输入区</h3>
        <label>任务意图（Intent）
          <textarea id="intent" maxlength="500">列出读取文件并计算行数的 Python 示例</textarea>
        </label>
        <label>示例（Examples，每行一条，最多 5 条）
          <textarea id="examples" placeholder="with open('file.txt') as f:&#10;    print(len(f.readlines()))"></textarea>
        </label>
        <label style="max-width:200px">输出格式
          <select id="formatSelect">
            <option value="code">代码 (Code)</option>
            <option value="json">JSON</option>
            <option value="markdown">Markdown</option>
            <option value="text">文本 (Text)</option>
          </select>
        </label>
        <div class="actions">
          <button class="primary" id="runBtn" onclick="runGenerate()">生成</button>
          <button onclick="loadExamples()">加载默认示例</button>
          <button class="ghost" onclick="clearResult()">清空结果</button>
          <span class="hint" id="countHint">0/500</span>
        </div>
      </div>

      <div class="card">
        <h3>运行信息</h3>
        <div class="meta-panel">
          <div class="meta-list">
            <div class="k">状态</div><div class="v" id="statusMsg">等待执行</div>
            <div class="k">评分</div><div class="v" id="scoreValue">-</div>
            <div class="k">风险问题</div><div class="v" id="issuesValue">[]</div>
            <div class="k">引擎</div><div class="v" id="engineValue">-</div>
            <div class="k">模型</div><div class="v" id="modelValue">-</div>
            <div class="k">示例来源</div><div class="v" id="exampleSourceValue">-</div>
          </div>
        </div>
      </div>
    </section>

    <section class="result-grid">
      <div class="card">
        <h3>优化后的 Prompt</h3>
        <pre id="promptOut"></pre>
      </div>
      <div class="card">
        <h3>生成输出</h3>
        <pre id="outputOut"></pre>
      </div>
    </section>

    <section class="card" id="historyCard" style="display:none">
      <h3>生成历史 <span style="font-weight:400;font-size:11px;color:var(--muted)">(点击条目恢复)</span></h3>
      <div id="historyList"></div>
      <div class="actions" style="margin-top:8px">
        <button class="ghost" onclick="clearHistory()">清空历史</button>
      </div>
    </section>
  </div>

  <div class="overlay" id="settingsOverlay">
    <div class="modal">
      <div class="modal-head">
        <strong>系统设置</strong>
        <button class="ghost" onclick="closeSettings()">关闭</button>
      </div>
      <div class="tabs">
        <button class="tab-btn active" data-tab="modelTab" onclick="switchTab(event)">模型管理</button>
        <button class="tab-btn" data-tab="apiTab" onclick="switchTab(event)">API 接入</button>
        <button class="tab-btn" data-tab="themeTab" onclick="switchTab(event)">主题</button>
      </div>

      <div class="tab active" id="modelTab">
        <label>模型名称
          <div class="model-row">
            <input id="modelNameInput" type="text" maxlength="100" placeholder="gpt-4o-mini">
            <select id="modelPreset" onchange="applyModelPreset()">
              <option value="">选择预设</option>
              <option value="gpt-4o-mini">gpt-4o-mini</option>
              <option value="gpt-4.1-mini">gpt-4.1-mini</option>
              <option value="claude-3-5-sonnet">claude-3-5-sonnet</option>
            </select>
          </div>
        </label>
      </div>

      <div class="tab" id="apiTab">
        <label><input id="apiEnabledInput" type="checkbox"> 启用 API 模型接入（关闭时使用 Mock）</label>
        <label>API 密钥
          <input id="apiKeyInput" type="password" maxlength="300" placeholder="请输入 API Key">
        </label>
        <label>Base URL
          <input id="baseUrlInput" type="text" placeholder="https://api.openai.com/v1">
        </label>
      </div>

      <div class="tab" id="themeTab">
        <label>界面主题
          <select id="themeSelectInput">
            <option value="dark">深色</option>
            <option value="light">浅色</option>
            <option value="system">跟随系统</option>
          </select>
        </label>
      </div>

      <div class="modal-actions">
        <button class="ghost" onclick="resetSettings()">恢复默认</button>
        <button class="primary" onclick="saveSettings()">保存设置</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "prompt-buddy.settings";
    const defaultSettings = {
      apiEnabled: false,
      apiKey: "",
      baseUrl: "https://api.openai.com/v1",
      model: "gpt-4o-mini",
      theme: "dark"
    };

    const intentEl = document.getElementById("intent");
    const examplesEl = document.getElementById("examples");
    const formatSelect = document.getElementById("formatSelect");
    const runBtn = document.getElementById("runBtn");
    const countHint = document.getElementById("countHint");
    const healthLabel = document.getElementById("healthLabel");
    const statusMsg = document.getElementById("statusMsg");
    const scoreValue = document.getElementById("scoreValue");
    const issuesValue = document.getElementById("issuesValue");
    const engineValue = document.getElementById("engineValue");
    const modelValue = document.getElementById("modelValue");
    const exampleSourceValue = document.getElementById("exampleSourceValue");
    const promptOut = document.getElementById("promptOut");
    const outputOut = document.getElementById("outputOut");
    const overlay = document.getElementById("settingsOverlay");
    const genSpinner = document.getElementById("genSpinner");
    const errorBadge = document.getElementById("errorBadge");

    const apiEnabledInput = document.getElementById("apiEnabledInput");
    const apiKeyInput = document.getElementById("apiKeyInput");
    const baseUrlInput = document.getElementById("baseUrlInput");
    const modelNameInput = document.getElementById("modelNameInput");
    const modelPreset = document.getElementById("modelPreset");
    const themeSelectInput = document.getElementById("themeSelectInput");

    let settings = loadSettings();

    function loadSettings() {
      try {
        const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        return { ...defaultSettings, ...stored };
      } catch {
        return { ...defaultSettings };
      }
    }

    function persistSettings() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
    }

    function getEffectiveTheme(theme) {
      if (theme !== "system") return theme;
      return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
    }

    function applyTheme(theme) {
      document.body.setAttribute("data-theme", getEffectiveTheme(theme));
    }

    function updateCount() {
      countHint.textContent = `${intentEl.value.length}/500`;
    }

    function parseExamples() {
      return examplesEl.value.split("\n").map((s) => s.trim()).filter(Boolean).slice(0, 5);
    }

    function fillSettingsForm() {
      apiEnabledInput.checked = !!settings.apiEnabled;
      apiKeyInput.value = settings.apiKey || "";
      baseUrlInput.value = settings.baseUrl || "";
      modelNameInput.value = settings.model || "";
      themeSelectInput.value = settings.theme || "dark";
      modelPreset.value = "";
    }

    function clearResult() {
      statusMsg.textContent = "等待执行";
      statusMsg.classList.remove("error");
      scoreValue.textContent = "-";
      issuesValue.textContent = "[]";
      engineValue.textContent = "-";
      modelValue.textContent = "-";
      exampleSourceValue.textContent = "-";
      promptOut.textContent = "";
      outputOut.textContent = "";
      hideLoading();
      hideError();
    }

    function showLoading() {
      genSpinner.classList.add("show");
      runBtn.disabled = true;
    }

    function hideLoading() {
      genSpinner.classList.remove("show");
      runBtn.disabled = false;
    }

    function showError(msg) {
      errorBadge.textContent = msg;
      errorBadge.classList.add("show");
    }

    function hideError() {
      errorBadge.classList.remove("show");
      errorBadge.textContent = "";
    }

    function setStatusError(msg) {
      statusMsg.innerHTML = `<span class="danger">${msg}</span>`;
      statusMsg.classList.add("error");
    }

    function openSettings() {
      fillSettingsForm();
      overlay.classList.add("show");
    }

    function closeSettings() {
      overlay.classList.remove("show");
    }

    function switchTab(event) {
      const tabId = event.currentTarget.dataset.tab;
      document.querySelectorAll(".tab-btn").forEach((el) => el.classList.remove("active"));
      document.querySelectorAll(".tab").forEach((el) => el.classList.remove("active"));
      event.currentTarget.classList.add("active");
      document.getElementById(tabId).classList.add("active");
    }

    function applyModelPreset() {
      if (modelPreset.value) modelNameInput.value = modelPreset.value;
    }

    function resetSettings() {
      settings = { ...defaultSettings };
      persistSettings();
      applyTheme(settings.theme);
      fillSettingsForm();
    }

    function saveSettings() {
      settings = {
        apiEnabled: apiEnabledInput.checked,
        apiKey: apiKeyInput.value.trim(),
        baseUrl: baseUrlInput.value.trim() || defaultSettings.baseUrl,
        model: modelNameInput.value.trim() || defaultSettings.model,
        theme: themeSelectInput.value
      };
      persistSettings();
      applyTheme(settings.theme);
      closeSettings();
      statusMsg.textContent = "设置已保存";
    }

    async function checkHealth() {
      try {
        const r = await fetch("/healthz");
        if (!r.ok) throw new Error("HTTP " + r.status);
        const data = await r.json();
        healthLabel.textContent = data.status === "ok" ? "服务正常" : "服务异常";
        hideError();
      } catch {
        healthLabel.textContent = "服务不可用";
        showError("离线");
      }
    }

    async function loadExamples() {
      statusMsg.textContent = "加载默认示例中...";
      try {
        const r = await fetch("/api/examples");
        if (!r.ok) throw new Error("HTTP " + r.status);
        const data = await r.json();
        examplesEl.value = (data.examples || []).join("\n");
        statusMsg.textContent = "默认示例加载完成";
      } catch (err) {
        statusMsg.textContent = "加载失败: " + err;
      }
    }

    async function runGenerate() {
      const intent = intentEl.value.trim();
      const examples = parseExamples();
      showLoading();
      hideError();
      statusMsg.textContent = settings.apiEnabled ? "正在调用模型 API..." : "生成中...";
      try {
        const payload = {
          intent,
          examples,
          format: formatSelect.value,
          settings: {
            apiEnabled: settings.apiEnabled,
            apiKey: settings.apiKey,
            baseUrl: settings.baseUrl,
            model: settings.model
          }
        };
        const r = await fetch("/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await r.json();
        if (!r.ok) {
          const errMsg = data.error || `HTTP ${r.status}`;
          if (r.status === 502) {
            statusMsg.textContent = "模型接口调用失败";
            showError("API 错误");
          } else if (r.status === 400) {
            statusMsg.textContent = "请求参数错误";
            showError("参数错误");
          } else {
            statusMsg.textContent = "请求失败";
            showError(r.status);
          }
          setStatusError(errMsg);
          hideLoading();
          return;
        }

        scoreValue.textContent = String(data.score ?? "-");
        issuesValue.textContent = JSON.stringify(data.issues || []);
        engineValue.textContent = data.meta?.engine || "-";
        modelValue.textContent = data.meta?.model || "-";
        exampleSourceValue.textContent = data.meta?.used_default_examples ? "默认示例" : "自定义示例";
        promptOut.textContent = data.system_prompt && data.user_text
          ? `【System】\n${data.system_prompt || ""}\n\n【User】\n${data.user_text || ""}`
          : (data.prompt || "");
        outputOut.textContent = data.output || "";
        statusMsg.classList.remove("error");
        statusMsg.textContent = "执行完成";
        hideError();
        saveHistoryEntry({
          time: Date.now(),
          intent,
          format: formatSelect.value,
          engine: data.meta?.engine || "mock",
          model: data.meta?.model || "mock",
          score: data.score,
          issues: data.issues,
          prompt: data.prompt,
          system_prompt: data.system_prompt,
          user_text: data.user_text,
          output: data.output
        });
      } catch (err) {
        showError("网络异常");
        setStatusError(`请求异常: ${err.message || err}`);
      } finally {
        hideLoading();
      }
    }

    overlay.addEventListener("click", (event) => {
      if (event.target === overlay) closeSettings();
    });

    intentEl.addEventListener("input", updateCount);
    window.matchMedia("(prefers-color-scheme: light)").addEventListener("change", () => {
      if (settings.theme === "system") applyTheme("system");
    });

    const HISTORY_KEY = "prompt-buddy.history";
    const MAX_HISTORY = 20;

    function loadHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]"); }
      catch { return []; }
    }

    function saveHistoryEntry(entry) {
      const hist = loadHistory();
      hist.unshift(entry);
      if (hist.length > MAX_HISTORY) hist.length = MAX_HISTORY;
      localStorage.setItem(HISTORY_KEY, JSON.stringify(hist));
      renderHistory();
    }

    function clearHistory() {
      localStorage.removeItem(HISTORY_KEY);
      renderHistory();
    }

    function renderHistory() {
      const hist = loadHistory();
      const card = document.getElementById("historyCard");
      const list = document.getElementById("historyList");
      card.style.display = hist.length ? "block" : "none";
      list.innerHTML = hist.map((h, i) => {
        const shortIntent = h.intent.length > 40 ? h.intent.slice(0, 40) + "..." : h.intent;
        const date = new Date(h.time).toLocaleString("zh-CN");
        const engineBadge = h.engine === "api"
          ? `<span class="hi-badge api">API</span>`
          : `<span class="hi-badge mock">Mock</span>`;
        const scoreBadge = h.score >= 80
          ? `<span class="hi-badge ok">${h.score}</span>`
          : `<span class="hi-badge warn">${h.score}</span>`;
        return `<div class="history-item" onclick="restoreHistory(${i})" title="${h.intent.replace(/"/g, '&quot;')}">
          <div><strong>${shortIntent}</strong></div>
          <div class="hi-time">${date}</div>
          <div class="hi-meta">${h.format} &middot; ${h.model} &middot; ${engineBadge} ${scoreBadge}</div>
        </div>`;
      }).join("");
    }

    function restoreHistory(index) {
      const hist = loadHistory();
      const entry = hist[index];
      if (!entry) return;
      intentEl.value = entry.intent;
      formatSelect.value = entry.format || "code";
      promptOut.textContent = entry.prompt || "";
      outputOut.textContent = entry.output || "";
      scoreValue.textContent = String(entry.score ?? "-");
      issuesValue.textContent = JSON.stringify(entry.issues || []);
      engineValue.textContent = entry.engine || "-";
      modelValue.textContent = entry.model || "-";
      exampleSourceValue.textContent = "-";
      statusMsg.textContent = "已恢复历史记录";
      statusMsg.classList.remove("error");
      updateCount();
    }

    applyTheme(settings.theme);
    clearResult();
    updateCount();
    checkHealth();
    renderHistory();
  </script>
</body>
</html>
