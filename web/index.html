<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Buddy</title>
  <style>
    :root {
      --bg: #111318;
      --panel: #181c24;
      --panel-soft: #202633;
      --line: #313a4a;
      --text: #e8ecf4;
      --muted: #a4afc3;
      --primary: #de7d5a;
      --primary-hover: #eb8965;
      --success: #61d38f;
      --danger: #e98585;
      --shadow: 0 10px 32px rgba(0, 0, 0, .24);
    }

    body[data-theme="light"] {
      --bg: #eef1f7;
      --panel: #ffffff;
      --panel-soft: #f5f7fb;
      --line: #d8dfec;
      --text: #1e2430;
      --muted: #647086;
      --primary: #d46843;
      --primary-hover: #c95b35;
      --success: #2ea66a;
      --danger: #d35656;
      --shadow: 0 10px 28px rgba(39, 50, 77, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(circle at top left, #1b2230, var(--bg) 45%);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      gap: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 16px;
      box-shadow: var(--shadow);
    }

    .title {
      font-weight: 700;
      font-size: 18px;
      letter-spacing: .3px;
    }

    .status {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid var(--line);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    .spinner.show { display: inline-block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .card h3 {
      margin: 0 0 12px;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .35px;
    }

    textarea, pre {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel-soft);
      color: var(--text);
      margin: 0;
      padding: 10px;
      font-size: 13px;
      line-height: 1.5;
      font-family: ui-monospace, Consolas, monospace;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
      outline: none;
    }

    pre {
      min-height: 240px;
      max-height: 400px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s ease;
      font-size: 13px;
    }

    button:hover { transform: translateY(-1px); }

    button.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #2b130c;
    }

    button.primary:hover { background: var(--primary-hover); }
    button.ghost { color: var(--muted); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .hint { margin-left: auto; color: var(--muted); font-size: 12px; }

    .features-row {
      margin-top: 10px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .feature-tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      background: var(--panel-soft);
      border: 1px solid var(--line);
      color: var(--muted);
    }

    .danger { color: var(--danger); }

    /* ── Examples dropdown ── */
    .examples-dropdown {
      position: relative;
      display: inline-block;
    }

    .dropdown-menu {
      display: none;
      position: absolute;
      bottom: 100%;
      left: 0;
      margin-bottom: 4px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: var(--shadow);
      z-index: 5;
      min-width: 180px;
      overflow: hidden;
    }

    .dropdown-menu.show { display: block; }

    .dropdown-menu button {
      display: block;
      width: 100%;
      text-align: left;
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    .dropdown-menu button:hover { background: var(--panel-soft); }

    /* ── Settings modal ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .35);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 10;
    }
    .overlay.show { display: flex; }

    .modal {
      width: min(600px, 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      padding: 10px 14px;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .tab-btn {
      border: 0;
      border-right: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      padding: 10px 14px;
      color: var(--muted);
    }
    .tab-btn.active { color: var(--text); background: var(--panel); }

    .tab {
      display: none;
      padding: 14px;
      gap: 10px;
    }
    .tab.active { display: grid; }

    label {
      font-size: 12px;
      color: var(--muted);
      display: grid;
      gap: 6px;
    }

    input, select {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel-soft);
      color: var(--text);
      padding: 8px 10px;
      outline: none;
    }

    .model-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .modal-actions {
      border-top: 1px solid var(--line);
      padding: 10px 14px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    /* ── History ── */
    .history-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background .15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .history-item:hover { background: var(--panel-soft); }
    .history-item .hi-time { color: var(--muted); font-size: 11px; white-space: nowrap; }
    .history-item .hi-intent { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hi-tag {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
      background: var(--line);
      color: var(--muted);
      white-space: nowrap;
    }

    @media (max-width: 980px) {
      .workspace { grid-template-columns: 1fr; }
      .hint { margin-left: 0; }
    }
  </style>
</head>
<body data-theme="dark">
  <div class="app">
    <header class="topbar">
      <div class="title">Prompt Buddy</div>
      <button class="ghost" onclick="openSettings()">设置</button>
      <div class="status"><span class="dot"></span><span id="healthLabel">检查中...</span><span class="spinner" id="genSpinner"></span></div>
    </header>

    <section class="workspace">
      <!-- ── Input ── -->
      <div class="card">
        <h3>输入区</h3>
        <label>任务意图（Intent）<span style="font-weight:400;color:var(--danger)">*</span>
          <textarea id="intent" maxlength="500" placeholder="描述你想要完成的任务..."></textarea>
        </label>
        <label style="margin-top:10px">风格参考（可选）— 输入示例文本，生成的 prompt 将匹配其语气和格式
          <textarea id="styleText" maxlength="2000" placeholder="在此粘贴风格参考文本...&#10;Prompt Buddy 会自动分析其中语气、格式、结构特征。"></textarea>
        </label>
        <div class="actions">
          <button class="primary" id="runBtn" onclick="runGenerate()">生成 Prompt</button>
          <div class="examples-dropdown">
            <button id="loadExamplesBtn" onclick="toggleExamplesMenu()">加载示例 ▾</button>
            <div class="dropdown-menu" id="examplesMenu"></div>
          </div>
          <button class="ghost" onclick="clearAll()">清空</button>
          <span class="hint" id="countHint">0/500</span>
        </div>
      </div>

      <!-- ── Result ── -->
      <div class="card">
        <h3>优化后的 Prompt</h3>
        <pre id="promptOut">等待生成...</pre>
        <div class="features-row" id="featuresRow"></div>
        <div class="actions">
          <button id="copyBtn" onclick="copyPrompt()" disabled>复制 Prompt</button>
          <span class="hint" id="resultHint"></span>
        </div>
      </div>
    </section>

    <!-- ── History ── -->
    <section class="card" id="historyCard" style="display:none">
      <h3>生成历史 <span style="font-weight:400;font-size:11px;color:var(--muted)">(点击恢复)</span></h3>
      <div id="historyList"></div>
      <div class="actions" style="margin-top:8px">
        <button class="ghost" onclick="clearHistory()">清空历史</button>
      </div>
    </section>
  </div>

  <!-- ── Settings Modal ── -->
  <div class="overlay" id="settingsOverlay">
    <div class="modal">
      <div class="modal-head">
        <strong>系统设置</strong>
        <button class="ghost" onclick="closeSettings()">关闭</button>
      </div>
      <div class="tabs">
        <button class="tab-btn active" data-tab="apiTab" onclick="switchTab(event)">API 接入</button>
        <button class="tab-btn" data-tab="themeTab" onclick="switchTab(event)">主题</button>
      </div>
      <div class="tab active" id="apiTab">
        <label>模型名称
          <div class="model-row">
            <input id="modelNameInput" type="text" maxlength="100" placeholder="gpt-4o-mini">
            <select id="modelPreset" onchange="applyModelPreset()">
              <option value="">选择预设</option>
              <option value="gpt-4o-mini">gpt-4o-mini</option>
              <option value="gpt-4.1-mini">gpt-4.1-mini</option>
              <option value="claude-3-5-sonnet">claude-3-5-sonnet</option>
            </select>
          </div>
        </label>
        <label><input id="apiEnabledInput" type="checkbox"> 启用 API 模型接入（预留）</label>
        <label>API 密钥
          <input id="apiKeyInput" type="password" maxlength="300" placeholder="请输入 API Key">
        </label>
        <label>Base URL
          <input id="baseUrlInput" type="text" placeholder="https://api.openai.com/v1">
        </label>
      </div>
      <div class="tab" id="themeTab">
        <label>界面主题
          <select id="themeSelectInput">
            <option value="dark">深色</option>
            <option value="light">浅色</option>
            <option value="system">跟随系统</option>
          </select>
        </label>
      </div>
      <div class="modal-actions">
        <button class="ghost" onclick="resetSettings()">恢复默认</button>
        <button class="primary" onclick="saveSettings()">保存设置</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "prompt-buddy-v3.settings";
    const HISTORY_KEY = "prompt-buddy-v3.history";
    const MAX_HISTORY = 20;
    const defaultSettings = {
      apiEnabled: false,
      apiKey: "",
      baseUrl: "https://api.openai.com/v1",
      model: "gpt-4o-mini",
      theme: "dark"
    };

    const intentEl = document.getElementById("intent");
    const styleTextEl = document.getElementById("styleText");
    const runBtn = document.getElementById("runBtn");
    const countHint = document.getElementById("countHint");
    const healthLabel = document.getElementById("healthLabel");
    const promptOut = document.getElementById("promptOut");
    const featuresRow = document.getElementById("featuresRow");
    const copyBtn = document.getElementById("copyBtn");
    const resultHint = document.getElementById("resultHint");
    const genSpinner = document.getElementById("genSpinner");
    const overlay = document.getElementById("settingsOverlay");
    const examplesMenu = document.getElementById("examplesMenu");

    const apiEnabledInput = document.getElementById("apiEnabledInput");
    const apiKeyInput = document.getElementById("apiKeyInput");
    const baseUrlInput = document.getElementById("baseUrlInput");
    const modelNameInput = document.getElementById("modelNameInput");
    const modelPreset = document.getElementById("modelPreset");
    const themeSelectInput = document.getElementById("themeSelectInput");

    let settings = loadSettings();

    function loadSettings() {
      try {
        const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        return { ...defaultSettings, ...stored };
      } catch { return { ...defaultSettings }; }
    }

    function persistSettings() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
    }

    function getEffectiveTheme(theme) {
      if (theme !== "system") return theme;
      return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
    }

    function applyTheme(theme) {
      document.body.setAttribute("data-theme", getEffectiveTheme(theme));
    }

    function updateCount() {
      countHint.textContent = `${intentEl.value.length}/500`;
    }

    function fillSettingsForm() {
      apiEnabledInput.checked = !!settings.apiEnabled;
      apiKeyInput.value = settings.apiKey || "";
      baseUrlInput.value = settings.baseUrl || "";
      modelNameInput.value = settings.model || "";
      themeSelectInput.value = settings.theme || "dark";
      modelPreset.value = "";
    }

    function clearAll() {
      intentEl.value = "";
      styleTextEl.value = "";
      promptOut.textContent = "等待生成...";
      featuresRow.innerHTML = "";
      copyBtn.disabled = true;
      resultHint.textContent = "";
      updateCount();
    }

    function openSettings() {
      fillSettingsForm();
      overlay.classList.add("show");
    }

    function closeSettings() {
      overlay.classList.remove("show");
    }

    function switchTab(event) {
      const tabId = event.currentTarget.dataset.tab;
      document.querySelectorAll(".tab-btn").forEach(el => el.classList.remove("active"));
      document.querySelectorAll(".tab").forEach(el => el.classList.remove("active"));
      event.currentTarget.classList.add("active");
      document.getElementById(tabId).classList.add("active");
    }

    function applyModelPreset() {
      if (modelPreset.value) modelNameInput.value = modelPreset.value;
    }

    function resetSettings() {
      settings = { ...defaultSettings };
      persistSettings();
      applyTheme(settings.theme);
      fillSettingsForm();
    }

    function saveSettings() {
      settings = {
        apiEnabled: apiEnabledInput.checked,
        apiKey: apiKeyInput.value.trim(),
        baseUrl: baseUrlInput.value.trim() || defaultSettings.baseUrl,
        model: modelNameInput.value.trim() || defaultSettings.model,
        theme: themeSelectInput.value
      };
      persistSettings();
      applyTheme(settings.theme);
      closeSettings();
    }

    async function checkHealth() {
      try {
        const r = await fetch("/healthz");
        const data = await r.json();
        healthLabel.textContent = data.status === "ok" ? "服务正常" : "服务异常";
      } catch {
        healthLabel.textContent = "服务不可用";
      }
    }

    async function loadExamplesList() {
      try {
        const r = await fetch("/api/examples");
        const data = await r.json();
        const items = data.examples || [];
        examplesMenu.innerHTML = items.map((ex, i) =>
          `<button onclick="loadStyleExample(${i})">${ex.label || "示例 " + (i+1)}</button>`
        ).join("");
      } catch {
        examplesMenu.innerHTML = "<button disabled>加载失败</button>";
      }
    }

    function toggleExamplesMenu() {
      examplesMenu.classList.toggle("show");
    }

    function loadStyleExample(index) {
      fetch("/api/examples").then(r => r.json()).then(data => {
        const items = data.examples || [];
        if (items[index]) {
          styleTextEl.value = items[index].text || "";
        }
      }).catch(() => {});
      examplesMenu.classList.remove("show");
    }

    function copyPrompt() {
      const text = promptOut.textContent;
      if (!text || text === "等待生成...") return;
      navigator.clipboard.writeText(text).then(() => {
        resultHint.textContent = "已复制!";
        setTimeout(() => { resultHint.textContent = ""; }, 2000);
      }).catch(() => {
        resultHint.textContent = "复制失败";
      });
    }

    function renderFeatures(features) {
      if (!features || !features.length) {
        featuresRow.innerHTML = "";
        return;
      }
      featuresRow.innerHTML = features.map(f =>
        `<span class="feature-tag">${f}</span>`
      ).join("");
    }

    async function runGenerate() {
      const intent = intentEl.value.trim();
      const styleText = styleTextEl.value.trim();
      runBtn.disabled = true;
      genSpinner.classList.add("show");
      resultHint.textContent = "优化中...";
      try {
        const payload = { intent, style_text: styleText || null };
        const r = await fetch("/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await r.json();
        if (!r.ok) {
          promptOut.textContent = `错误: ${data.error || ("HTTP " + r.status)}`;
          featuresRow.innerHTML = "";
          copyBtn.disabled = true;
          resultHint.textContent = "请求失败";
          return;
        }
        promptOut.textContent = data.prompt || "";
        renderFeatures(data.style_features || []);
        copyBtn.disabled = false;
        resultHint.textContent = data.meta?.style_provided ? "已匹配风格" : "默认风格";
        saveHistoryEntry({
          time: Date.now(),
          intent,
          style_text: styleText || "",
          style_features: data.style_features || [],
          prompt: data.prompt
        });
      } catch (err) {
        promptOut.textContent = `网络异常: ${err.message || err}`;
        featuresRow.innerHTML = "";
        copyBtn.disabled = true;
        resultHint.textContent = "网络错误";
      } finally {
        runBtn.disabled = false;
        genSpinner.classList.remove("show");
      }
    }

    // ── History ──
    function loadHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]"); }
      catch { return []; }
    }

    function saveHistoryEntry(entry) {
      const hist = loadHistory();
      hist.unshift(entry);
      if (hist.length > MAX_HISTORY) hist.length = MAX_HISTORY;
      localStorage.setItem(HISTORY_KEY, JSON.stringify(hist));
      renderHistory();
    }

    function clearHistory() {
      localStorage.removeItem(HISTORY_KEY);
      renderHistory();
    }

    function renderHistory() {
      const hist = loadHistory();
      const card = document.getElementById("historyCard");
      const list = document.getElementById("historyList");
      card.style.display = hist.length ? "block" : "none";
      list.innerHTML = hist.map((h, i) => {
        const short = h.intent.length > 50 ? h.intent.slice(0, 50) + "..." : h.intent;
        const date = new Date(h.time).toLocaleString("zh-CN");
        const tag = (h.style_features || []).slice(0, 2).map(f =>
          `<span class="hi-tag">${f}</span>`
        ).join(" ");
        return `<div class="history-item" onclick="restoreHistory(${i})">
          <span class="hi-intent" title="${h.intent.replace(/"/g, '&quot;')}">${short}</span>
          ${tag}
          <span class="hi-time">${date}</span>
        </div>`;
      }).join("");
    }

    function restoreHistory(index) {
      const hist = loadHistory();
      const entry = hist[index];
      if (!entry) return;
      intentEl.value = entry.intent || "";
      styleTextEl.value = entry.style_text || "";
      promptOut.textContent = entry.prompt || "";
      renderFeatures(entry.style_features || []);
      copyBtn.disabled = !entry.prompt;
      resultHint.textContent = "已恢复历史记录";
      updateCount();
    }

    // ── Init ──
    overlay.addEventListener("click", (e) => { if (e.target === overlay) closeSettings(); });
    intentEl.addEventListener("input", updateCount);
    window.matchMedia("(prefers-color-scheme: light)").addEventListener("change", () => {
      if (settings.theme === "system") applyTheme("system");
    });
    document.addEventListener("click", (e) => {
      if (!e.target.closest(".examples-dropdown")) examplesMenu.classList.remove("show");
    });

    applyTheme(settings.theme);
    updateCount();
    checkHealth();
    loadExamplesList();
    renderHistory();
  </script>
</body>
</html>
