<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Buddy</title>
  <style>
    :root {
      --bg: #111318;
      --panel: #181c24;
      --panel-soft: #202633;
      --line: #313a4a;
      --text: #e8ecf4;
      --muted: #a4afc3;
      --primary: #de7d5a;
      --primary-hover: #eb8965;
      --success: #61d38f;
      --danger: #e98585;
      --shadow: 0 10px 32px rgba(0, 0, 0, .24);
    }

    body[data-theme="light"] {
      --bg: #eef1f7;
      --panel: #ffffff;
      --panel-soft: #f5f7fb;
      --line: #d8dfec;
      --text: #1e2430;
      --muted: #647086;
      --primary: #d46843;
      --primary-hover: #c95b35;
      --success: #2ea66a;
      --danger: #d35656;
      --shadow: 0 10px 28px rgba(39, 50, 77, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(circle at top left, #1b2230, var(--bg) 45%);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      gap: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
    }

    .title {
      font-weight: 700;
      font-size: 18px;
      letter-spacing: .3px;
    }

    .status {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      box-shadow: var(--shadow);
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .35px;
    }

    textarea, pre, .meta-panel {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel-soft);
      color: var(--text);
      margin: 0;
      padding: 10px;
      font-size: 13px;
      line-height: 1.5;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
      outline: none;
      font-family: ui-monospace, Consolas, monospace;
    }

    pre {
      min-height: 170px;
      max-height: 300px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, Consolas, monospace;
    }

    .actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel-soft);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .18s ease;
    }

    button:hover { transform: translateY(-1px); }

    button.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #2b130c;
    }

    button.primary:hover { background: var(--primary-hover); }
    button.ghost { color: var(--muted); }

    .hint { margin-left: auto; color: var(--muted); font-size: 12px; }
    .danger { color: var(--danger); }

    .result-grid {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 10px;
    }

    .meta-panel {
      min-height: 120px;
      font-size: 12px;
      color: var(--muted);
    }

    .meta-list {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 10px;
    }

    .meta-list .k { color: var(--muted); }
    .meta-list .v { color: var(--text); }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .35);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 10;
    }

    .overlay.show { display: flex; }

    .modal {
      width: min(780px, 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .tab-btn {
      border: 0;
      border-right: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      padding: 10px 14px;
      color: var(--muted);
    }

    .tab-btn.active {
      color: var(--text);
      background: var(--panel);
    }

    .tab {
      display: none;
      padding: 12px;
      gap: 10px;
    }

    .tab.active { display: grid; }

    label {
      font-size: 12px;
      color: var(--muted);
      display: grid;
      gap: 6px;
    }

    input, select {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel-soft);
      color: var(--text);
      padding: 8px 10px;
      outline: none;
    }

    .model-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .modal-actions {
      border-top: 1px solid var(--line);
      padding: 10px 12px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    @media (max-width: 980px) {
      .workspace, .result-grid {
        grid-template-columns: 1fr;
      }
      .hint { margin-left: 0; }
    }
  </style>
</head>
<body data-theme="dark">
  <div class="app">
    <header class="topbar">
      <div class="title">Prompt Buddy 控制台</div>
      <button class="ghost" onclick="openSettings()">设置</button>
      <div class="status"><span class="dot"></span><span id="healthLabel">检查服务中...</span></div>
    </header>

    <section class="workspace">
      <div class="card">
        <h3>输入区</h3>
        <label>任务意图（Intent）
          <textarea id="intent" maxlength="500">列出读取文件并计算行数的 Python 示例</textarea>
        </label>
        <label>示例（Examples，每行一条，最多 5 条）
          <textarea id="examples" placeholder="with open('file.txt') as f:&#10;    print(len(f.readlines()))"></textarea>
        </label>
        <div class="actions">
          <button class="primary" id="runBtn" onclick="runGenerate()">生成</button>
          <button onclick="loadExamples()">加载默认示例</button>
          <button class="ghost" onclick="clearResult()">清空结果</button>
          <span class="hint" id="countHint">0/500</span>
        </div>
      </div>

      <div class="card">
        <h3>运行信息</h3>
        <div class="meta-panel">
          <div class="meta-list">
            <div class="k">状态</div><div class="v" id="statusMsg">等待执行</div>
            <div class="k">评分</div><div class="v" id="scoreValue">-</div>
            <div class="k">风险问题</div><div class="v" id="issuesValue">[]</div>
            <div class="k">引擎</div><div class="v" id="engineValue">-</div>
            <div class="k">模型</div><div class="v" id="modelValue">-</div>
            <div class="k">示例来源</div><div class="v" id="exampleSourceValue">-</div>
          </div>
        </div>
      </div>
    </section>

    <section class="result-grid">
      <div class="card">
        <h3>优化后的 Prompt</h3>
        <pre id="promptOut"></pre>
      </div>
      <div class="card">
        <h3>生成输出</h3>
        <pre id="outputOut"></pre>
      </div>
    </section>
  </div>

  <div class="overlay" id="settingsOverlay">
    <div class="modal">
      <div class="modal-head">
        <strong>系统设置</strong>
        <button class="ghost" onclick="closeSettings()">关闭</button>
      </div>
      <div class="tabs">
        <button class="tab-btn active" data-tab="modelTab" onclick="switchTab(event)">模型管理</button>
        <button class="tab-btn" data-tab="apiTab" onclick="switchTab(event)">API 接入</button>
        <button class="tab-btn" data-tab="themeTab" onclick="switchTab(event)">主题</button>
      </div>

      <div class="tab active" id="modelTab">
        <label>模型名称
          <div class="model-row">
            <input id="modelNameInput" type="text" maxlength="100" placeholder="gpt-4o-mini">
            <select id="modelPreset" onchange="applyModelPreset()">
              <option value="">选择预设</option>
              <option value="gpt-4o-mini">gpt-4o-mini</option>
              <option value="gpt-4.1-mini">gpt-4.1-mini</option>
              <option value="claude-3-5-sonnet">claude-3-5-sonnet</option>
            </select>
          </div>
        </label>
      </div>

      <div class="tab" id="apiTab">
        <label><input id="apiEnabledInput" type="checkbox"> 启用 API 模型接入（关闭时使用 Mock）</label>
        <label>API 密钥
          <input id="apiKeyInput" type="password" maxlength="300" placeholder="请输入 API Key">
        </label>
        <label>Base URL
          <input id="baseUrlInput" type="text" placeholder="https://api.openai.com/v1">
        </label>
      </div>

      <div class="tab" id="themeTab">
        <label>界面主题
          <select id="themeSelectInput">
            <option value="dark">深色</option>
            <option value="light">浅色</option>
            <option value="system">跟随系统</option>
          </select>
        </label>
      </div>

      <div class="modal-actions">
        <button class="ghost" onclick="resetSettings()">恢复默认</button>
        <button class="primary" onclick="saveSettings()">保存设置</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "prompt-buddy.settings";
    const defaultSettings = {
      apiEnabled: false,
      apiKey: "",
      baseUrl: "https://api.openai.com/v1",
      model: "gpt-4o-mini",
      theme: "dark"
    };

    const intentEl = document.getElementById("intent");
    const examplesEl = document.getElementById("examples");
    const runBtn = document.getElementById("runBtn");
    const countHint = document.getElementById("countHint");
    const healthLabel = document.getElementById("healthLabel");
    const statusMsg = document.getElementById("statusMsg");
    const scoreValue = document.getElementById("scoreValue");
    const issuesValue = document.getElementById("issuesValue");
    const engineValue = document.getElementById("engineValue");
    const modelValue = document.getElementById("modelValue");
    const exampleSourceValue = document.getElementById("exampleSourceValue");
    const promptOut = document.getElementById("promptOut");
    const outputOut = document.getElementById("outputOut");
    const overlay = document.getElementById("settingsOverlay");

    const apiEnabledInput = document.getElementById("apiEnabledInput");
    const apiKeyInput = document.getElementById("apiKeyInput");
    const baseUrlInput = document.getElementById("baseUrlInput");
    const modelNameInput = document.getElementById("modelNameInput");
    const modelPreset = document.getElementById("modelPreset");
    const themeSelectInput = document.getElementById("themeSelectInput");

    let settings = loadSettings();

    function loadSettings() {
      try {
        const stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        return { ...defaultSettings, ...stored };
      } catch {
        return { ...defaultSettings };
      }
    }

    function persistSettings() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
    }

    function getEffectiveTheme(theme) {
      if (theme !== "system") return theme;
      return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
    }

    function applyTheme(theme) {
      document.body.setAttribute("data-theme", getEffectiveTheme(theme));
    }

    function updateCount() {
      countHint.textContent = `${intentEl.value.length}/500`;
    }

    function parseExamples() {
      return examplesEl.value.split("\n").map((s) => s.trim()).filter(Boolean).slice(0, 5);
    }

    function fillSettingsForm() {
      apiEnabledInput.checked = !!settings.apiEnabled;
      apiKeyInput.value = settings.apiKey || "";
      baseUrlInput.value = settings.baseUrl || "";
      modelNameInput.value = settings.model || "";
      themeSelectInput.value = settings.theme || "dark";
      modelPreset.value = "";
    }

    function clearResult() {
      statusMsg.textContent = "等待执行";
      scoreValue.textContent = "-";
      issuesValue.textContent = "[]";
      engineValue.textContent = "-";
      modelValue.textContent = "-";
      exampleSourceValue.textContent = "-";
      promptOut.textContent = "";
      outputOut.textContent = "";
    }

    function openSettings() {
      fillSettingsForm();
      overlay.classList.add("show");
    }

    function closeSettings() {
      overlay.classList.remove("show");
    }

    function switchTab(event) {
      const tabId = event.currentTarget.dataset.tab;
      document.querySelectorAll(".tab-btn").forEach((el) => el.classList.remove("active"));
      document.querySelectorAll(".tab").forEach((el) => el.classList.remove("active"));
      event.currentTarget.classList.add("active");
      document.getElementById(tabId).classList.add("active");
    }

    function applyModelPreset() {
      if (modelPreset.value) modelNameInput.value = modelPreset.value;
    }

    function resetSettings() {
      settings = { ...defaultSettings };
      persistSettings();
      applyTheme(settings.theme);
      fillSettingsForm();
    }

    function saveSettings() {
      settings = {
        apiEnabled: apiEnabledInput.checked,
        apiKey: apiKeyInput.value.trim(),
        baseUrl: baseUrlInput.value.trim() || defaultSettings.baseUrl,
        model: modelNameInput.value.trim() || defaultSettings.model,
        theme: themeSelectInput.value
      };
      persistSettings();
      applyTheme(settings.theme);
      closeSettings();
      statusMsg.textContent = "设置已保存";
    }

    async function checkHealth() {
      try {
        const r = await fetch("/healthz");
        if (!r.ok) throw new Error("HTTP " + r.status);
        const data = await r.json();
        healthLabel.textContent = data.status === "ok" ? "服务正常" : "服务异常";
      } catch {
        healthLabel.textContent = "服务不可用";
      }
    }

    async function loadExamples() {
      statusMsg.textContent = "加载默认示例中...";
      try {
        const r = await fetch("/api/examples");
        if (!r.ok) throw new Error("HTTP " + r.status);
        const data = await r.json();
        examplesEl.value = (data.examples || []).join("\n");
        statusMsg.textContent = "默认示例加载完成";
      } catch (err) {
        statusMsg.textContent = "加载失败: " + err;
      }
    }

    async function runGenerate() {
      const intent = intentEl.value.trim();
      const examples = parseExamples();
      runBtn.disabled = true;
      statusMsg.textContent = "生成中...";
      try {
        const payload = {
          intent,
          examples,
          settings: {
            apiEnabled: settings.apiEnabled,
            apiKey: settings.apiKey,
            baseUrl: settings.baseUrl,
            model: settings.model
          }
        };
        const r = await fetch("/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await r.json();
        if (!r.ok) {
          statusMsg.innerHTML = `<span class="danger">请求失败: ${data.error || ("HTTP " + r.status)}</span>`;
          return;
        }

        scoreValue.textContent = String(data.score ?? "-");
        issuesValue.textContent = JSON.stringify(data.issues || []);
        engineValue.textContent = data.meta?.engine || "-";
        modelValue.textContent = data.meta?.model || "-";
        exampleSourceValue.textContent = data.meta?.used_default_examples ? "默认示例" : "自定义示例";
        promptOut.textContent = data.prompt || "";
        outputOut.textContent = data.output || "";
        statusMsg.textContent = "执行完成";
      } catch (err) {
        statusMsg.innerHTML = `<span class="danger">请求异常: ${err}</span>`;
      } finally {
        runBtn.disabled = false;
      }
    }

    overlay.addEventListener("click", (event) => {
      if (event.target === overlay) closeSettings();
    });

    intentEl.addEventListener("input", updateCount);
    window.matchMedia("(prefers-color-scheme: light)").addEventListener("change", () => {
      if (settings.theme === "system") applyTheme("system");
    });

    applyTheme(settings.theme);
    clearResult();
    updateCount();
    checkHealth();
  </script>
</body>
</html>
