name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 打包 exe
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --name prompt-buddy `
            --add-data "web;web" `
            --add-data "app\templates;app\templates" `
            app\main.py

      - name: 创建 Release 并上传资产
        uses: softprops/action-gh-release@v2
        with:
          files: dist/prompt-buddy.exe
