name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行基础检查
        run: |
          python - <<'PY'
          import sys
          sys.path.insert(0, "app")
          import main
          c = main.app.test_client()
          assert c.get("/healthz").status_code == 200
          assert c.post("/generate", json={"intent":"demo","examples":[],"settings":{"apiEnabled":False}}).status_code == 200
          print("CI checks passed")
          PY
